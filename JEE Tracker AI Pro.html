<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: rgba(20, 20, 20, 0.6);
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --danger: #ef4444;
            --physics: #3b82f6;
            --chemistry: #ec4899;
            --maths: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background: radial-gradient(circle at 50% 0%, #1a1a2e 0%, var(--bg-color) 70%);
        }

        /* AI Animated Background Glow */
        .glow-orb {
            position: fixed;
            width: 300px;
            height: 300px;
            background: var(--primary);
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.3;
            animation: float 10s infinite alternate;
            z-index: -1;
        }

        @keyframes float {
            0% { transform: translate(-100px, -50px); }
            100% { transform: translate(100px, 50px); }
        }

        .container {
            width: 95%;
            max-width: 1000px;
            padding: 20px;
            margin-top: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px var(--primary-glow);
            animation: pulseText 3s infinite;
        }

        @keyframes pulseText {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-panel:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px 0 var(--primary-glow);
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="number"], input[type="date"], select {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, filter 0.2s;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        button.btn-danger {
            background: linear-gradient(135deg, var(--danger), #b91c1c);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        button:hover {
            filter: brightness(1.2);
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: none;
            width: auto;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .c-phy { color: var(--physics); text-shadow: 0 0 10px var(--physics); }
        .c-che { color: var(--chemistry); text-shadow: 0 0 10px var(--chemistry); }
        .c-mat { color: var(--maths); text-shadow: 0 0 10px var(--maths); }

        /* Achiever Animation Overlay */
        #achieverOverlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .achiever-badge {
            font-size: 4rem;
            color: #fbbf24;
            text-transform: uppercase;
            font-weight: 900;
            text-shadow: 0 0 30px #f59e0b, 0 0 60px #f59e0b;
            text-align: center;
            animation: zoomBounce 1s cubic-bezier(0.28, 0.84, 0.42, 1) forwards;
        }

        .achiever-subtext {
            color: white;
            font-size: 1.2rem;
            margin-top: 15px;
            opacity: 0;
            animation: fadeIn 1s 0.8s forwards;
        }

        @keyframes zoomBounce {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Achiever Overlay -->
    <div id="achieverOverlay">
        <div class="achiever-badge">🏆 Daily Master! 🏆</div>
        <div class="achiever-subtext">25+ Questions Completed in ALL Subjects! Keep Crushing It!</div>
    </div>

    <div class="glow-orb"></div>

    <div class="container">
        <header>
            <h1>JEE Tracker AI Pro</h1>
            <p style="color: var(--text-muted); margin-top: 5px;">Unlimited Entries • Intelligent Analytics</p>
        </header>

        <!-- Entry Section -->
        <div class="glass-panel">
            <h2 style="margin-bottom: 15px; font-weight: 500;">Log Questions</h2>
            <div class="input-grid">
                <div class="input-group">
                    <label>Date (Customizable)</label>
                    <input type="date" id="entryDate" required="">
                </div>
                <div class="input-group">
                    <label style="color: var(--physics)">Physics</label>
                    <input type="number" id="phyCount" min="0" placeholder="No limit..." required="">
                </div>
                <div class="input-group">
                    <label style="color: var(--chemistry)">Chemistry</label>
                    <input type="number" id="cheCount" min="0" placeholder="No limit..." required="">
                </div>
                <div class="input-group">
                    <label style="color: var(--maths)">Maths</label>
                    <input type="number" id="matCount" min="0" placeholder="No limit..." required="">
                </div>
            </div>
            <div class="button-group">
                <button onclick="saveData()">Sync to AI Database</button>
                <button class="btn-danger" onclick="removeDataForDate()">Remove Data for Date</button>
            </div>
        </div>

        <!-- Analytics Section -->
        <div class="glass-panel">
            <h2 style="margin-bottom: 15px; font-weight: 500;">Advanced Analytics</h2>
            
            <div class="controls">
                <button class="tab-btn active" onclick="setTimescale(&#39;day&#39;, this)">Daily</button>
                <button class="tab-btn" onclick="setTimescale(&#39;month&#39;, this)">Monthly</button>
                <button class="tab-btn" onclick="setTimescale(&#39;year&#39;, this)">Yearly</button>
                
                <select id="chartFormat" onchange="updateDashboard()" style="margin-left: 15px; width: auto; padding: 8px;">
                    <option value="bar">Bar Graph</option>
                    <option value="line">Line Graph</option>
                    <option value="radar">Radar Chart</option>
                </select>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <label>Total Physics</label>
                    <div class="stat-value c-phy" id="statPhy">0</div>
                </div>
                <div class="stat-card">
                    <label>Total Chemistry</label>
                    <div class="stat-value c-che" id="statChe">0</div>
                </div>
                <div class="stat-card">
                    <label>Total Maths</label>
                    <div class="stat-value c-mat" id="statMat">0</div>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="analysisChart" width="1135" height="500" style="display: block; box-sizing: border-box; height: 400px; width: 908.4px;"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Set today's date as default
        document.getElementById('entryDate').valueAsDate = new Date();

        let trackerData = JSON.parse(localStorage.getItem('jeeAIProData')) || {};
        let currentChart = null;
        let currentTimescale = 'day';

        function saveData() {
            const date = document.getElementById('entryDate').value;
            const p = parseInt(document.getElementById('phyCount').value) || 0;
            const c = parseInt(document.getElementById('cheCount').value) || 0;
            const m = parseInt(document.getElementById('matCount').value) || 0;

            if(!date) return alert("Please select a date");

            if (!trackerData[date]) {
                trackerData[date] = { p: 0, c: 0, m: 0 };
            }
            trackerData[date].p += p;
            trackerData[date].c += c;
            trackerData[date].m += m;

            localStorage.setItem('jeeAIProData', JSON.stringify(trackerData));
            
            // Clear inputs
            document.getElementById('phyCount').value = '';
            document.getElementById('cheCount').value = '';
            document.getElementById('matCount').value = '';
            
            checkAchieverMilestone(date);
            updateDashboard();
        }

        // New Feature: Remove Data for customizable date
        function removeDataForDate() {
            const date = document.getElementById('entryDate').value;
            if(!date) return alert("Please select a date first.");

            if(trackerData[date]) {
                if(confirm(`Are you sure you want to permanently delete all records for ${date}?`)) {
                    delete trackerData[date];
                    localStorage.setItem('jeeAIProData', JSON.stringify(trackerData));
                    updateDashboard();
                }
            } else {
                alert("No data exists for the selected date.");
            }
        }

        // New Feature: Achiever Animation Check
        function checkAchieverMilestone(date) {
            const data = trackerData[date];
            // Check if user hit 25+ in EACH subject on this date
            if (data && data.p >= 25 && data.c >= 25 && data.m >= 25) {
                const sessionKey = 'achiever_shown_' + date;
                if (!sessionStorage.getItem(sessionKey)) {
                    triggerAnimation();
                    sessionStorage.setItem(sessionKey, 'true'); // Prevents spamming per session
                }
            }
        }

        function triggerAnimation() {
            const overlay = document.getElementById('achieverOverlay');
            overlay.style.display = 'flex';
            
            // Hide overlay after 3.5 seconds
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 3500);
        }

        function setTimescale(scale, btnElement) {
            currentTimescale = scale;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            updateDashboard();
        }

        function updateDashboard() {
            const aggregatedData = aggregateData(currentTimescale);
            updateStats(aggregatedData);
            renderChart(aggregatedData);
        }

        function aggregateData(scale) {
            const result = {};
            const sortedDates = Object.keys(trackerData).sort();

            sortedDates.forEach(dateStr => {
                const dateObj = new Date(dateStr);
                let key;
                
                if (scale === 'day') {
                    key = dateStr;
                } else if (scale === 'month') {
                    key = dateObj.toLocaleString('default', { month: 'short', year: 'numeric' });
                } else if (scale === 'year') {
                    key = dateObj.getFullYear().toString();
                }

                if (!result[key]) result[key] = { p: 0, c: 0, m: 0 };
                result[key].p += trackerData[dateStr].p;
                result[key].c += trackerData[dateStr].c;
                result[key].m += trackerData[dateStr].m;
            });

            return result;
        }

        function updateStats(data) {
            let totalP = 0, totalC = 0, totalM = 0;
            Object.values(data).forEach(val => {
                totalP += val.p;
                totalC += val.c;
                totalM += val.m;
            });

            document.getElementById('statPhy').innerText = totalP;
            document.getElementById('statChe').innerText = totalC;
            document.getElementById('statMat').innerText = totalM;
        }

        function renderChart(data) {
            const ctx = document.getElementById('analysisChart').getContext('2d');
            const labels = Object.keys(data);
            const pData = labels.map(l => data[l].p);
            const cData = labels.map(l => data[l].c);
            const mData = labels.map(l => data[l].m);

            // Read the dynamically customizable format option
            const formatType = document.getElementById('chartFormat').value;

            if (currentChart) {
                currentChart.destroy();
            }

            // Configure scale visibility based on chart format (Radar doesn't use x/y axes)
            const scaleOptions = formatType === 'radar' ? {
                r: {
                    angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                    grid: { color: 'rgba(255, 255, 255, 0.1)' },
                    pointLabels: { color: '#94a3b8' },
                    ticks: { display: false }
                }
            } : {
                y: {
                    beginAtZero: true,
                    grid: { color: 'rgba(255, 255, 255, 0.1)' },
                    ticks: { color: '#94a3b8' }
                },
                x: {
                    grid: { display: false },
                    ticks: { color: '#94a3b8' }
                }
            };

            currentChart = new Chart(ctx, {
                type: formatType,
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Physics',
                            data: pData,
                            backgroundColor: 'rgba(59, 130, 246, 0.5)',
                            borderColor: '#3b82f6',
                            borderWidth: 2,
                            borderRadius: formatType === 'bar' ? 4 : 0,
                            fill: formatType !== 'line'
                        },
                        {
                            label: 'Chemistry',
                            data: cData,
                            backgroundColor: 'rgba(236, 72, 153, 0.5)',
                            borderColor: '#ec4899',
                            borderWidth: 2,
                            borderRadius: formatType === 'bar' ? 4 : 0,
                            fill: formatType !== 'line'
                        },
                        {
                            label: 'Maths',
                            data: mData,
                            backgroundColor: 'rgba(16, 185, 129, 0.5)',
                            borderColor: '#10b981',
                            borderWidth: 2,
                            borderRadius: formatType === 'bar' ? 4 : 0,
                            fill: formatType !== 'line'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: scaleOptions,
                    plugins: {
                        legend: { labels: { color: '#f8fafc' } },
                        tooltip: { mode: 'index', intersect: false }
                    },
                    animation: {
                        duration: 1500,
                        easing: 'easeOutQuart'
                    }
                }
            });
        }

        // Initialize dashboard on load
        updateDashboard();
    </script>

</body></html>
